name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: bcmath, dom, fileinfo, gd, mbstring, pdo_sqlite, sqlite3, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run test suite
        run: php artisan test

      - name: Audit locked dependencies
        run: composer audit --locked --no-interaction

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build development image
        run: docker compose build

      - name: Run test suite in Docker
        run: docker compose run --rm test

      - name: Build production image
        run: docker build --build-arg COMPOSER_NO_DEV=1 --tag tutoring-platform:ci .
