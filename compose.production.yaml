name: tutoring-platform

x-production-environment: &production-environment
  APP_NAME: ${APP_NAME:-Tutoring Platform}
  APP_ENV: production
  APP_KEY: ${APP_KEY:?Set APP_KEY in the production environment}
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:?Set APP_URL in the production environment}
  APP_LOCALE: ${APP_LOCALE:-it}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  LOG_CHANNEL: stderr
  LOG_LEVEL: ${LOG_LEVEL:-warning}
  DB_CONNECTION: mysql
  DB_HOST: ${DB_HOST:?Set DB_HOST in the production environment}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in the production environment}
  DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in the production environment}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in the production environment}
  BROADCAST_DRIVER: reverb
  CACHE_DRIVER: ${CACHE_DRIVER:-file}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Tutoring Platform}
  STRIPE_KEY: ${STRIPE_KEY:-}
  STRIPE_SECRET: ${STRIPE_SECRET:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  REVERB_APP_ID: ${REVERB_APP_ID:?Set REVERB_APP_ID in the production environment}
  REVERB_APP_KEY: ${REVERB_APP_KEY:?Set REVERB_APP_KEY in the production environment}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:?Set REVERB_APP_SECRET in the production environment}
  REVERB_HOST: reverb
  REVERB_PORT: 8080
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080
  REVERB_PUBLIC_HOST: ${REVERB_PUBLIC_HOST:?Set REVERB_PUBLIC_HOST in the production environment}
  REVERB_PUBLIC_PORT: ${REVERB_PUBLIC_PORT:-443}
  REVERB_PUBLIC_SCHEME: ${REVERB_PUBLIC_SCHEME:-https}
  DOCKER_RUN_MIGRATIONS: "false"
  DOCKER_SEED_DATABASE: "false"

services:
  app:
    image: ${APP_IMAGE:-tutoring-platform-app:production}
    build:
      context: .
      args:
        COMPOSER_NO_DEV: "1"
    environment:
      <<: *production-environment
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  reverb:
    image: ${APP_IMAGE:-tutoring-platform-app:production}
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      <<: *production-environment
    ports:
      - "${REVERB_BIND_PORT:-8080}:8080"
    volumes:
      - app-storage:/var/www/html/storage
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "$$socket = @fsockopen('127.0.0.1', 8080); exit($$socket ? 0 : 1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  app-storage:
